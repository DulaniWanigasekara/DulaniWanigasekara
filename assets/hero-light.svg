<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .hero {
          width: 900px; height: 420px;
          background: linear-gradient(135deg, #e8f4fd 0%, #dbeafe 40%, #ede9fe 70%, #f0f9ff 100%);
          display: flex; align-items: center; justify-content: space-between;
          padding: 30px 40px; position: relative; overflow: hidden;
          font-family: 'Share Tech Mono', monospace;
        }
        .grid-bg {
          position: absolute; inset: 0;
          background-image: linear-gradient(rgba(0,120,200,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,120,200,0.06) 1px, transparent 1px);
          background-size: 40px 40px;
        }
        .glow-orb { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,120,200,0.1) 0%, transparent 70%); top: -80px; left: -60px; }
        .left { position: relative; z-index: 2; flex: 1; animation: fadeInLeft 0.8s ease-out forwards; }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        .tag { display: inline-block; font-size: 11px; color: #0077b6; border: 1px solid rgba(0,120,200,0.4); padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 2px; }
        .name { font-family: 'Orbitron', monospace; font-size: 34px; font-weight: 700; color: #1e293b; line-height: 1.1; margin-bottom: 6px; }
        .name span { color: #0077b6; }
        .role { font-size: 12px; color: #7c3aed; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px; }
        .desc { font-size: 13px; color: #475569; line-height: 1.7; max-width: 360px; margin-bottom: 24px; }
        .desc strong { color: #0077b6; }
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-family: 'Share Tech Mono', monospace; text-decoration: none; letter-spacing: 1px; animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        .btn:nth-child(1) { animation-delay: 0.3s; }
        .btn:nth-child(2) { animation-delay: 0.5s; }
        .btn:nth-child(3) { animation-delay: 0.7s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary { background: rgba(0,120,200,0.1); border: 1px solid rgba(0,120,200,0.4); color: #0077b6; }
        .btn-secondary { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.3); color: #7c3aed; }
        .btn-ghost { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.15); color: #475569; }
        .right { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; animation: fadeInRight 0.8s ease-out 0.2s forwards; opacity: 0; }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .speech-bubble { background: rgba(0,120,200,0.08); border: 1px solid rgba(0,120,200,0.25); border-radius: 16px 16px 4px 16px; padding: 14px 18px; max-width: 220px; margin-bottom: 12px; position: relative; }
        .speech-bubble::after { content: ''; position: absolute; bottom: -10px; right: 20px; border: 5px solid transparent; border-top-color: rgba(0,120,200,0.25); }
        .speech-text { font-size: 12px; color: #0077b6; line-height: 1.5; font-style: italic; }
        .char-img { width: 180px; height: 180px; object-fit: contain; filter: hue-rotate(200deg) saturate(1.3); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .corner { position: absolute; width: 20px; height: 20px; }
        .corner-tl { top: 10px; left: 10px; border-top: 2px solid #0077b6; border-left: 2px solid #0077b6; }
        .corner-tr { top: 10px; right: 10px; border-top: 2px solid #0077b6; border-right: 2px solid #0077b6; }
        .corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid #0077b6; border-left: 2px solid #0077b6; }
        .corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid #0077b6; border-right: 2px solid #0077b6; }
      </style>
      <div class="hero">
        <div class="grid-bg"></div>
        <div class="glow-orb"></div>
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="left">
          <div class="tag">▶ ONLINE // READY</div>
          <div class="name">DULANI<br/><span>WANIGASEKARA</span></div>
          <div class="role">Software Engineer · Full-Stack · UI/UX</div>
          <div class="desc">Building software that doesn't just work — it <strong>matters</strong>. Where clean code meets beautiful design.</div>
          <div class="buttons">
            <a class="btn btn-primary" href="https://linkedin.com/in/dulani-wanigasekara">⟨ LinkedIn ⟩</a>
            <a class="btn btn-secondary" href="mailto:your@email.com">⟨ Email ⟩</a>
            <a class="btn btn-ghost" href="https://github.com/DulaniWanigasekara">⟨ GitHub ⟩</a>
          </div>
        </div>
        <div class="right">
          <div class="speech-bubble">
            <div class="speech-text">"Light mode? Bold choice... let's build something amazing anyway! ✨"</div>
          </div>
          <img class="char-img" src="https://user-images.githubusercontent.com/74038190/213844263-a8897a51-32f4-4b3b-b5c2-e1528b89f6f3.png" alt="character"/>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
