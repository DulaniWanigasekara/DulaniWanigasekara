<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="40%" style="stop-color:#dbeafe"/>
      <stop offset="70%" style="stop-color:#ede9fe"/>
      <stop offset="100%" style="stop-color:#f0f9ff"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(0,119,182,0)"/>
      <stop offset="50%" style="stop-color:rgba(0,119,182,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(0,119,182,0)"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,119,182,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(0,119,182,0)"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(124,58,237,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(124,58,237,0)"/>
    </radialGradient>
  </defs>

  <rect width="900" height="380" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="rgba(0,119,182,0.06)" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="40" y1="0" x2="40" y2="380"/><line x1="80" y1="0" x2="80" y2="380"/>
    <line x1="120" y1="0" x2="120" y2="380"/><line x1="160" y1="0" x2="160" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/><line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="280" y1="0" x2="280" y2="380"/><line x1="320" y1="0" x2="320" y2="380"/>
    <line x1="360" y1="0" x2="360" y2="380"/><line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="440" y1="0" x2="440" y2="380"/><line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="520" y1="0" x2="520" y2="380"/><line x1="560" y1="0" x2="560" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/><line x1="640" y1="0" x2="640" y2="380"/>
    <line x1="680" y1="0" x2="680" y2="380"/><line x1="720" y1="0" x2="720" y2="380"/>
    <line x1="760" y1="0" x2="760" y2="380"/><line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="840" y1="0" x2="840" y2="380"/><line x1="880" y1="0" x2="880" y2="380"/>
  </g>

  <ellipse cx="60" cy="60" rx="180" ry="180" fill="url(#orb1)" opacity="0.7"/>
  <ellipse cx="680" cy="300" rx="150" ry="150" fill="url(#orb2)" opacity="0.8"/>

  <!-- Corners -->
  <g stroke="#0077b6" stroke-width="2" fill="none">
    <polyline points="10,30 10,10 30,10"/>
    <polyline points="870,10 890,10 890,30"/>
    <polyline points="10,350 10,370 30,370"/>
    <polyline points="870,370 890,370 890,350"/>
  </g>

  <rect x="0" y="0" width="900" height="2" fill="url(#scanGrad)">
    <animate attributeName="y" from="0" to="380" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Tag -->
  <rect x="40" y="30" width="160" height="22" rx="11" fill="none" stroke="rgba(0,119,182,0.5)" stroke-width="1"/>
  <circle cx="56" cy="41" r="4" fill="#00bb77">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="66" y="46" font-family="monospace" font-size="10" fill="#0077b6" letter-spacing="2">▶ ONLINE // READY</text>

  <!-- Name -->
  <text x="40" y="90" font-family="monospace" font-size="36" font-weight="bold" fill="#1e293b">DULANI</text>
  <text x="40" y="132" font-family="monospace" font-size="36" font-weight="bold" fill="#0077b6">WANIGASEKARA</text>
  <text x="40" y="158" font-family="monospace" font-size="11" fill="#7c3aed" letter-spacing="3">SOFTWARE ENGINEER · FULL-STACK · UI/UX</text>
  <line x1="40" y1="170" x2="420" y2="170" stroke="rgba(0,119,182,0.2)" stroke-width="1"/>

  <text x="40" y="192" font-family="monospace" font-size="12" fill="#475569">Building software that doesn't just work —</text>
  <text x="40" y="210" font-family="monospace" font-size="12" fill="#475569">it <tspan fill="#0077b6" font-weight="bold">matters</tspan>. Where clean code meets</text>
  <text x="40" y="228" font-family="monospace" font-size="12" fill="#475569">beautiful design.</text>

  <!-- Buttons -->
  <rect x="40" y="248" width="110" height="28" rx="6" fill="rgba(0,119,182,0.1)" stroke="rgba(0,119,182,0.4)" stroke-width="1"/>
  <text x="95" y="267" font-family="monospace" font-size="11" fill="#0077b6" text-anchor="middle">⟨ LinkedIn ⟩</text>
  <rect x="160" y="248" width="90" height="28" rx="6" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="205" y="267" font-family="monospace" font-size="11" fill="#7c3aed" text-anchor="middle">⟨ Email ⟩</text>
  <rect x="260" y="248" width="100" height="28" rx="6" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <text x="310" y="267" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">⟨ GitHub ⟩</text>

  <!-- Character -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3s" repeatCount="indefinite" additive="sum"/>

    <!-- Speech bubble -->
    <rect x="590" y="25" width="250" height="70" rx="14" fill="rgba(0,119,182,0.08)" stroke="rgba(0,119,182,0.3)" stroke-width="1.5"/>
    <polygon points="720,95 735,110 750,95" fill="rgba(0,119,182,0.08)" stroke="rgba(0,119,182,0.3)" stroke-width="1.5"/>
    <text x="715" y="52" font-family="monospace" font-size="11" fill="#0077b6" text-anchor="middle" font-style="italic">"Light mode? Bold choice...</text>
    <text x="715" y="68" font-family="monospace" font-size="11" fill="#0077b6" text-anchor="middle" font-style="italic">let's build something</text>
    <text x="715" y="84" font-family="monospace" font-size="11" fill="#0077b6" text-anchor="middle" font-style="italic">amazing! ✨"</text>

    <!-- Body -->
    <ellipse cx="710" cy="310" rx="55" ry="65" fill="#1a4a8f"/>
    <ellipse cx="710" cy="330" rx="50" ry="50" fill="#153d7a"/>
    <polygon points="695,240 710,260 725,240" fill="#1e5ca8"/>
    <rect x="703" y="220" width="14" height="22" rx="7" fill="#f5c5a3"/>
    <ellipse cx="710" cy="200" rx="42" ry="45" fill="#f5c5a3"/>
    <ellipse cx="710" cy="175" rx="46" ry="30" fill="#2a2a4e"/>
    <ellipse cx="710" cy="162" rx="42" ry="22" fill="#2a2a4e"/>
    <ellipse cx="668" cy="200" rx="12" ry="35" fill="#2a2a4e"/>
    <ellipse cx="752" cy="200" rx="12" ry="35" fill="#2a2a4e"/>
    <path d="M 668 175 Q 650 210 655 240" stroke="#2a2a4e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 752 175 Q 770 210 765 240" stroke="#2a2a4e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <ellipse cx="695" cy="202" rx="8" ry="9" fill="white"/>
    <ellipse cx="725" cy="202" rx="8" ry="9" fill="white"/>
    <ellipse cx="696" cy="203" rx="5" ry="6" fill="#0066cc"/>
    <ellipse cx="726" cy="203" rx="5" ry="6" fill="#0066cc"/>
    <ellipse cx="697" cy="203" rx="3" ry="3.5" fill="#003366"/>
    <ellipse cx="727" cy="203" rx="3" ry="3.5" fill="#003366"/>
    <circle cx="699" cy="200" r="1.5" fill="white"/>
    <circle cx="729" cy="200" r="1.5" fill="white"/>
    <path d="M 688 193 Q 695 188 702 191" stroke="#2a2a4e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 718 191 Q 725 188 732 193" stroke="#2a2a4e" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 708 210 Q 710 216 712 210" stroke="rgba(180,100,80,0.5)" stroke-width="1.5" fill="none"/>
    <path d="M 700 220 Q 710 228 720 220" stroke="#d4776a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="688" cy="215" rx="8" ry="5" fill="rgba(255,150,150,0.25)"/>
    <ellipse cx="732" cy="215" rx="8" ry="5" fill="rgba(255,150,150,0.25)"/>
    <path d="M 660 260 Q 640 290 645 320" stroke="#1a4a8f" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 760 260 Q 780 290 775 320" stroke="#1a4a8f" stroke-width="18" fill="none" stroke-linecap="round"/>
    <ellipse cx="645" cy="325" rx="10" ry="10" fill="#f5c5a3"/>
    <ellipse cx="775" cy="325" rx="10" ry="10" fill="#f5c5a3"/>
    <rect x="645" y="325" width="130" height="80" rx="5" fill="#e8f0fe" stroke="#0077b6" stroke-width="1.5"/>
    <rect x="650" y="330" width="120" height="65" rx="3" fill="#dbeafe"/>
    <rect x="655" y="335" width="110" height="55" rx="2" fill="#eff6ff"/>
    <rect x="660" y="342" width="60" height="3" rx="1" fill="#0077b6" opacity="0.7"/>
    <rect x="660" y="350" width="80" height="3" rx="1" fill="#7c3aed" opacity="0.7"/>
    <rect x="660" y="358" width="50" height="3" rx="1" fill="#0077b6" opacity="0.5"/>
    <rect x="660" y="366" width="70" height="3" rx="1" fill="#059669" opacity="0.6"/>
    <rect x="660" y="374" width="40" height="3" rx="1" fill="#7c3aed" opacity="0.5"/>

    <!-- Blue fire -->
    <path d="M 760 270 Q 775 255 770 240 Q 785 250 780 235 Q 795 248 785 260 Q 790 270 775 275 Z" fill="#0077b6" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.3;0.7;0.4;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <line x1="40" y1="360" x2="860" y2="360" stroke="rgba(0,119,182,0.15)" stroke-width="1"/>
  <text x="450" y="374" font-family="monospace" font-size="9" fill="rgba(0,119,182,0.4)" text-anchor="middle" letter-spacing="4">◈ DULANI.DEV ◈</text>
